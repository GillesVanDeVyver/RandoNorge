<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none">
  <!-- Fjellrute favicon: the MountainIcon mark from src/components/icons.tsx,
       styled like the in-app brand icon (LoginPage .brandIcon):
       accent teal tile with accent-contrast strokes.
       Keep in sync with the component and index.css tokens. -->
  <rect width="24" height="24" rx="5.5" fill="#2dd4bf"/>
  <g transform="translate(1.2 1.2) scale(0.9)"
     stroke="#04241f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- skyline: tall left peak, main summit, low right peak -->
    <path d="M1.5 20 L6.5 8.5 L9.5 12.5 L13 5.5 L17.5 17 L19.5 14.5 L22.5 20 Z"/>
    <!-- route up the main face -->
    <path d="M18.5 19.9 C 13 19 10.5 16.5 12 13.8 C 13 11.9 12.9 9.6 12.95 7.8"
          stroke-width="1.8"/>
  </g>
</svg>
